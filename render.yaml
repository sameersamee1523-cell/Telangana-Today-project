services:
  - type: web
    name: pipeline-server
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install --prefix backend
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      # ── Aiven MySQL ──────────────────────────────────
      - key: DB_HOST
        value: mysql-38771e2e-sameersamee1523-ffb2.l.aivencloud.com
      - key: DB_PORT
        value: "14795"
      - key: DB_USER
        value: avnadmin
      - key: DB_PASSWORD
        sync: false          # Set this manually in Render dashboard
      - key: DB_NAME
        value: defaultdb
      - key: DB_SSL
        value: "true"
      # ── Auth ─────────────────────────────────────────
      - key: JWT_SECRET
        sync: false          # Set this manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: "7d"
      # ── Frontend URL ──────────────────────────────────
      - key: CLIENT_URL
        sync: false          # Set after frontend is deployed
